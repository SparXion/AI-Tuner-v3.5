# Netlify — AI Tuner (aitunerapp.com)
# v5.0 is the live product; publish from AI-Tuner-v5.0/ (matches local dev).
# Calibrated model profiles ship in-repo (public product data).

[build]
  publish = "AI-Tuner-v5.0"

# Legacy URLs from when the site was deployed from repo root
[[redirects]]
  from = "/AI-Tuner-v5.0/*"
  to = "/:splat"
  status = 301

[[redirects]]
  from = "/"
  to = "/index.html"
  status = 200

# Old app.html bookmarks → unified home
[[redirects]]
  from = "/app.html"
  to = "/index.html"
  status = 301

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "ALLOWALL"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/src/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
