<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AITuner v5.0 — Domain Model</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: #f8f7f4;
    color: #1a1a18;
    padding: 32px 24px;
    min-height: 100vh;
  }
  header {
    margin-bottom: 32px;
  }
  header h1 {
    font-size: 22px;
    font-weight: 500;
    color: #1a1a18;
    margin-bottom: 4px;
  }
  header p {
    font-size: 13px;
    color: #888780;
  }
  #erd {
    background: #ffffff;
    border: 0.5px solid #d3d1c7;
    border-radius: 12px;
    padding: 24px;
    overflow-x: auto;
  }
  #erd svg { width: 100%; height: auto; }
  .legend {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    margin-top: 20px;
    padding: 16px 20px;
    background: #ffffff;
    border: 0.5px solid #d3d1c7;
    border-radius: 8px;
    font-size: 12px;
    color: #5f5e5a;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 2px;
    flex-shrink: 0;
  }
  footer {
    margin-top: 20px;
    font-size: 11px;
    color: #b4b2a9;
    text-align: right;
  }
</style>
</head>
<body>

<header>
  <h1>AITuner v5.0 — Domain Model</h1>
  <p>15 entities · March 15, 2026 · Part of the Cursor handoff package</p>
</header>

<div id="erd"></div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#EEEDFE; border: 1px solid #534AB7;"></div> User &amp; Session</div>
  <div class="legend-item"><div class="legend-dot" style="background:#E1F5EE; border: 1px solid #0F6E56;"></div> Config &amp; Prompt</div>
  <div class="legend-item"><div class="legend-dot" style="background:#FAEEDA; border: 1px solid #854F0B;"></div> Lever &amp; Pillar</div>
  <div class="legend-item"><div class="legend-dot" style="background:#f8f7f4; border: 1px solid #d3d1c7;"></div> Model, Persona, Intent</div>
  <div class="legend-item"><div class="legend-dot" style="background:#FAECE7; border: 1px solid #993C1D;"></div> Decoder</div>
  <div class="legend-item"><div class="legend-dot" style="background:#f8f7f4; border: 1px solid #b4b2a9;"></div> Calibration</div>
</div>

<footer>AITuner v5.0 · aitunerapp.com</footer>

<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';

mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '-apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif',
  themeVariables: {
    darkMode: false,
    fontSize: '13px',
    fontFamily: '-apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif',
    lineColor: '#73726c',
    textColor: '#3d3d3a',
    primaryColor: '#EEEDFE',
    primaryBorderColor: '#534AB7',
    primaryTextColor: '#26215C',
    secondaryColor: '#E1F5EE',
    secondaryBorderColor: '#0F6E56',
    tertiaryColor: '#FAEEDA',
    tertiaryBorderColor: '#854F0B',
  },
});

const diagram = `erDiagram
  USER {
    string id PK
    int tier
    bool has_copied
    bool has_tuned
    bool skip_onboarding
  }
  PROFILE {
    string user_id FK
    string preferred_model
    string default_intent
    timestamp last_active
  }
  SESSION {
    string id PK
    string user_id FK
    string model_id FK
    string intent
    string entry_point
    timestamp created_at
  }
  CONFIG {
    string id PK
    string user_id FK
    string model_id FK
    string name
    string source
    string persona_id FK
    timestamp created_at
  }
  LEVER_VALUES {
    string config_id FK
    string lever_key FK
    int value
  }
  MODEL {
    string id PK
    string name
    string provider
    string voice_signature
  }
  LEVER {
    string key PK
    string name
    string pillar
    string description
    string low_label
    string high_label
    int default_value
  }
  PILLAR {
    string id PK
    string label
    string description
    string radar_color
  }
  PERSONA {
    string id PK
    string name
    string description
    string activation_snippet
    string type
  }
  PROMPT {
    string id PK
    string config_id FK
    string model_id FK
    string generated_text
    timestamp created_at
  }
  INTENT {
    string id PK
    string label
    string description
    string routes_to
  }
  DECODED_PROMPT {
    string id PK
    string user_id FK
    string raw_input
    string unmapped_instructions
    timestamp created_at
  }
  DECODED_LEVER_VALUE {
    string decoded_id FK
    string lever_key FK
    int value
    int confidence
  }
  CALIBRATION_RUN {
    string id PK
    string model_id FK
    timestamp run_at
    string schema_version
  }
  ELICITATION_RESPONSE {
    string run_id FK
    string model_id FK
    string raw_response
    timestamp created_at
  }

  USER ||--|| PROFILE : has
  USER ||--o{ SESSION : starts
  USER ||--o{ CONFIG : saves
  USER ||--o{ DECODED_PROMPT : decodes

  SESSION ||--o| CONFIG : becomes
  SESSION }o--|| MODEL : uses
  SESSION }o--|| INTENT : guided_by

  CONFIG ||--o{ LEVER_VALUES : contains
  CONFIG }o--|| MODEL : targets
  CONFIG }o--o| PERSONA : applies
  CONFIG ||--o{ PROMPT : generates

  LEVER_VALUES }o--|| LEVER : references
  LEVER }o--|| PILLAR : belongs_to

  PERSONA ||--o{ LEVER_VALUES : presets
  MODEL ||--o{ LEVER_VALUES : defaults

  DECODED_PROMPT ||--o{ DECODED_LEVER_VALUE : maps_to
  DECODED_LEVER_VALUE }o--|| LEVER : references
  DECODED_PROMPT ||--o| CONFIG : converts_to

  CALIBRATION_RUN }o--|| MODEL : calibrates
  CALIBRATION_RUN ||--o{ ELICITATION_RESPONSE : produces
`;

const { svg } = await mermaid.render('erd-svg', diagram);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg.erDiagram .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});

document.querySelectorAll('#erd svg.erDiagram .row-rect-odd path, #erd svg.erDiagram .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
</body>
</html>
